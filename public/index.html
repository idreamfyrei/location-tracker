<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Maps</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
      }

      #map {
        height: 100vh;
        width: 100vw;
      }

      /* ── Login banner (shown when anonymous) ── */
      .auth-banner {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 900;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 20px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.97);
        box-shadow: 0 8px 32px rgba(15, 23, 42, 0.2);
        white-space: nowrap;
      }

      .auth-banner p {
        margin: 0;
        font-size: 14px;
        color: #475467;
      }

      /* ── Authenticated user chip (top right) ── */
      .map-user {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 900;
        display: none;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
      }

      .avatar, .marker-avatar {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 2px solid #fff;
        border-radius: 999px;
        color: #fff;
        background: #1f7a8c;
        box-shadow: 0 7px 18px rgba(15, 23, 42, 0.24);
        font-size: 13px;
        font-weight: 800;
      }

      .marker-avatar {
        width: 36px;
        height: 36px;
        border-color: #f8fafc;
      }

      .map-user strong {
        display: block;
        max-width: min(220px, 52vw);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }

      .map-user form { margin: 0; }

      .logout-button {
        border: 0;
        background: transparent;
        color: #475467;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 0;
      }

      .button {
        min-height: 36px;
        padding: 0 14px;
        border: 1px solid #1d4ed8;
        border-radius: 8px;
        color: #fff;
        background: #2563eb;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- Shown when not logged in — sits over the map without blocking it -->
    <div class="auth-banner" id="authBanner" hidden>
      <p>Sign in to share your live location</p>
      <a class="button" id="idpLogin" href="/auth/login">Continue with IdP</a>
    </div>

    <!-- Shown when logged in -->
    <aside class="map-user" id="mapUser">
      <span class="avatar" id="mapUserAvatar"></span>
      <strong id="mapUserName"></strong>
      <form method="post" action="/auth/logout">
        <button class="logout-button" type="submit">Logout</button>
      </form>
    </aside>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const authBanner   = document.getElementById("authBanner");
      const idpLogin     = document.getElementById("idpLogin");
      const mapUser      = document.getElementById("mapUser");
      const mapUserAvatar = document.getElementById("mapUserAvatar");
      const mapUserName  = document.getElementById("mapUserName");

      // Map is always visible — initialise immediately
      const map = L.map("map").setView([28.6139, 77.209], 11);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      let currentUser = null;
      let locationInterval = null;
      const remoteMarkers = new Map();

      function markerIcon(user) {
        const initials = String(user?.initials || "U")
          .replace(/[<>&"']/g, "")
          .slice(0, 3);
        return L.divIcon({
          className: "",
          html: `<span class="marker-avatar">${initials}</span>`,
          iconSize: [36, 36],
          iconAnchor: [18, 18],
          popupAnchor: [0, -20],
        });
      }

      function setMarkerUser(marker, user) {
        marker.setIcon(markerIcon(user));
        marker.bindPopup(user?.name || user?.email || "Signed-in user");
      }

      // ── Incoming location updates from other users ────────────────────────
      socket.on("server:location:update", (data) => {
        const { id, latitude, longitude, user } = data;

        if (id === socket.id && myMarker) {
          myMarker.setLatLng([latitude, longitude]);
          setMarkerUser(myMarker, user || currentUser);
          return;
        }

        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude], { icon: markerIcon(user) });
          marker.addTo(map).bindPopup(user?.name || id);
          remoteMarkers.set(id, marker);
        } else {
          const m = remoteMarkers.get(id);
          m.setLatLng([latitude, longitude]);
          setMarkerUser(m, user);
        }
      });

      // ── Remove marker when a user disconnects ─────────────────────────────
      socket.on("server:user:disconnected", ({ id }) => {
        const marker = remoteMarkers.get(id);
        if (marker) {
          marker.remove();
          remoteMarkers.delete(id);
        }
      });

      socket.on("server:auth:required", () => {
        authBanner.hidden = false;
      });

      // ── Geolocation helpers ───────────────────────────────────────────────
      function getCurrentPosition() {
        return new Promise((resolve, reject) => {
          if (!("geolocation" in navigator)) {
            reject(new Error("Geolocation not supported"));
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
        });
      }

      let myMarker = null;

      async function startLocationSharing(intervalMs) {
        try {
          const pos = await getCurrentPosition();
          const { latitude, longitude } = pos.coords;

          socket.emit("user:location:update", { latitude, longitude });

          myMarker = L.marker([latitude, longitude], { icon: markerIcon(currentUser) })
            .addTo(map)
            .bindPopup(currentUser.name || "You")
            .openPopup();

          map.setView([latitude, longitude], 13);

          locationInterval = setInterval(async () => {
            try {
              const p = await getCurrentPosition();
              socket.emit("user:location:update", {
                latitude:  p.coords.latitude,
                longitude: p.coords.longitude,
              });
            } catch (err) {
              console.warn("Location update failed:", err.message);
            }
          }, intervalMs);
        } catch (err) {
          console.error("Could not get location:", err.message);
        }
      }

      // ── Session check on load ─────────────────────────────────────────────
      async function main() {
        const res     = await fetch("/api/me");
        const session = await res.json();

        if (!session.authenticated) {
          // Map is already visible — just show the login banner
          authBanner.hidden = false;
          idpLogin.style.display = session.oidc?.configured ? "inline-flex" : "none";
          return;
        }

        currentUser = session.user;
        mapUser.style.display = "flex";
        mapUserAvatar.textContent = currentUser.initials || currentUser.name?.[0]?.toUpperCase() || "U";
        mapUserName.textContent   = currentUser.name || currentUser.email;

        await startLocationSharing(session.locationIntervalMs || 10000);
      }

      window.addEventListener("load", main);
    </script>
  </body>
</html>
