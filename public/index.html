<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Maps</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      #map {
        height: 100vh;
        width: 100vw;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      var map = L.map("map").setView([28.6139, 77.209], 11);

      const remoteMarker = new Map();
      socket.on('server:location:update', (data) => {
        const { id, latitude, longitude } = data;
        if(remoteMarkers.has(id)){
          const marker = L.marker([latitude,longitude]).addTo(map).bindPopup(id);
          remoteMarker.set(id, marker);
        }else{
          const existingMarker = remoteMarker.get(id);
          existingMarker.setLatLng([latitude,longitude])
        }
      } )
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      function getUserCurrentLocation() {
        return new Promise((resolve, reject) => {
          if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                console.log("User current location", position);
                const { latitude, longitude } = position.coords;
                resolve({ latitude, longitude });
              },
              (error) => {
                reject(error);
              },
              { enableHighAccuracy: true },
            );
          } else {
            alert("Geolocation is not supported by this browser.");
          }
        });
      }

      let myCurrentLocatioMarker = null;

      async function main() {
        try {
          const { latitude, longitude } = await getUserCurrentLocation();
          socket.emit("user:location:update", { latitude, longitude });
          myCurrentLocatioMarker = L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup("You are here")
            .openPopup();

          map.setView([latitude, longitude], 13);

          setInterval(async () => {
            const { latitude, longitude } = await getUserCurrentLocation();

            myCurrentLocatioMarker.setLatLng([latitude, longitude]);
          }, 10 * 1000);
        } catch (error) {
          console.error("Error getting location:", error);
        }
      }

      window.addEventListener("load", main);
    </script>
  </body>
</html>
