<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Maps</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #172033;
      }

      [hidden] {
        display: none !important;
      }

      #map {
        height: 100vh;
        width: 100vw;
      }

      .auth-shell {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(rgba(13, 18, 29, 0.62), rgba(13, 18, 29, 0.62)),
          url("https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1800&q=80")
            center/cover;
      }

      .auth-panel {
        width: min(720px, 100%);
        display: grid;
        gap: 22px;
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      }

      .auth-panel h1,
      .auth-panel p {
        margin: 0;
      }

      .auth-panel h1 {
        font-size: clamp(28px, 6vw, 46px);
        line-height: 1.05;
      }

      .auth-panel p {
        max-width: 58ch;
        color: #4f5a6d;
        line-height: 1.55;
      }

      .auth-note {
        padding: 12px;
        border: 1px solid #d8dfec;
        border-radius: 8px;
        background: #f8fafc;
        color: #344054;
        line-height: 1.45;
      }

      .auth-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .button,
      .auth-actions button {
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid #1d4ed8;
        border-radius: 8px;
        color: #fff;
        background: #2563eb;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .button.secondary,
      .auth-actions button.secondary {
        border-color: #cbd5e1;
        color: #172033;
        background: #fff;
      }

      .auth-actions button:disabled {
        opacity: 0.48;
        pointer-events: none;
      }

      .map-user {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 900;
        display: none;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
      }

      .avatar,
      .marker-avatar {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 2px solid #fff;
        border-radius: 999px;
        color: #fff;
        background: #1f7a8c;
        box-shadow: 0 7px 18px rgba(15, 23, 42, 0.24);
        font-size: 13px;
        font-weight: 800;
      }

      .marker-avatar {
        width: 36px;
        height: 36px;
        border-color: #f8fafc;
      }

      .map-user strong {
        display: block;
        max-width: min(220px, 52vw);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }

      .map-user form {
        margin: 0;
      }

      .logout-button {
        border: 0;
        background: transparent;
        color: #475467;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 0;
      }

      @media (max-width: 640px) {
        .auth-shell {
          padding: 14px;
        }

        .auth-panel {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <section class="auth-shell" id="authShell" hidden>
      <div class="auth-panel">
        <div>
          <h1>Doodle Maps</h1>
          <p>
            Share your live location with signed-in people on this local map.
            Continue with your IdP account, or create one before joining.
          </p>
        </div>

        <p class="auth-note">
          After login, your browser will ask for location access and your marker
          will be shown on the map with your initials.
        </p>

        <div class="auth-actions">
          <a class="button" id="idpLogin" href="/auth/login">
            Continue with IdP
          </a>
        </div>
      </div>
    </section>
    <aside class="map-user" id="mapUser">
      <span class="avatar" id="mapUserAvatar"></span>
      <strong id="mapUserName"></strong>
      <form method="post" action="/auth/logout">
        <button class="logout-button" type="submit">Logout</button>
      </form>
    </aside>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const authShell = document.getElementById("authShell");
      const idpLogin = document.getElementById("idpLogin");
      const mapUser = document.getElementById("mapUser");
      const mapUserAvatar = document.getElementById("mapUserAvatar");
      const mapUserName = document.getElementById("mapUserName");

      var map = L.map("map").setView([28.6139, 77.209], 11);

      let currentUser = null;
      const remoteMarkers = new Map();

      function markerIcon(user) {
        const initials = String(user?.initials || "U")
          .replace(/[<>&"']/g, "")
          .slice(0, 3);
        return L.divIcon({
          className: "",
          html: `<span class="marker-avatar">${initials}</span>`,
          iconSize: [36, 36],
          iconAnchor: [18, 18],
          popupAnchor: [0, -20],
        });
      }

      function setMarkerUser(marker, user) {
        marker.setIcon(markerIcon(user));
        marker.bindPopup(user?.name || user?.email || "Signed-in user");
      }

      socket.on("server:location:update", (data) => {
        const { id, latitude, longitude, user } = data;
        if (id === socket.id && myCurrentLocationMarker) {
          myCurrentLocationMarker.setLatLng([latitude, longitude]);
          setMarkerUser(myCurrentLocationMarker, user || currentUser);
          return;
        }

        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude], {
            icon: markerIcon(user),
          });
          marker.addTo(map).bindPopup(user?.name || id);
          remoteMarkers.set(id, marker);
        } else {
          const existingMarker = remoteMarkers.get(id);
          existingMarker.setLatLng([latitude, longitude]);
          setMarkerUser(existingMarker, user);
        }
      });

      socket.on("server:auth:required", () => {
        authShell.hidden = false;
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      function getUserCurrentLocation() {
        return new Promise((resolve, reject) => {
          if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                console.log("User current location", position);
                const { latitude, longitude } = position.coords;
                resolve({ latitude, longitude });
              },
              (error) => {
                reject(error);
              },
              { enableHighAccuracy: true },
            );
          } else {
            alert("Geolocation is not supported by this browser.");
          }
        });
      }

      let myCurrentLocationMarker = null;

      async function loadSession() {
        const response = await fetch("/api/me");
        const session = await response.json();

        if (!session.authenticated) {
          authShell.hidden = false;
          idpLogin.style.display = session.oidc.configured ? "inline-flex" : "none";
          return false;
        }

        currentUser = session.user;
        mapUser.style.display = "flex";
        mapUserAvatar.textContent = currentUser.initials;
        mapUserName.textContent = currentUser.name || currentUser.email;
        return true;
      }

      async function main() {
        const authenticated = await loadSession();
        if (!authenticated) return;

        try {
          const { latitude, longitude } = await getUserCurrentLocation();
          socket.emit("user:location:update", { latitude, longitude });
          myCurrentLocationMarker = L.marker([latitude, longitude], {
            icon: markerIcon(currentUser),
          })
            .addTo(map)
            .bindPopup(currentUser.name || "You are here")
            .openPopup();

          map.setView([latitude, longitude], 13);

          setInterval(async () => {
            const { latitude, longitude } = await getUserCurrentLocation();

            myCurrentLocationMarker.setLatLng([latitude, longitude]);
            socket.emit("user:location:update", { latitude, longitude });
          }, 10 * 1000);
        } catch (error) {
          console.error("Error getting location:", error);
        }
      }

      window.addEventListener("load", main);
    </script>
  </body>
</html>
